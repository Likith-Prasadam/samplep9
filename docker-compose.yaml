version: '3.8'

services:
  spectra-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_SSE_ENDPOINT_URL=${VITE_SSE_ENDPOINT_URL:-https://api-load-test.p9sphere.com/api/v1/notifications/sse}
        - VITE_CHAT_API_URL=${VITE_CHAT_API_URL:-https://api-load-test.p9sphere.com/api/v1/chat/completions}
        - VITE_IMAGE_CHAT_API_URL=${VITE_IMAGE_CHAT_API_URL:-https://api-demo.p9sphere.com/api/claude-chat/stream}
        - VITE_SMART_MANUFACTURING_API_URL=${VITE_SMART_MANUFACTURING_API_URL:-https://spectra-manufacture.p9sphere.com/process-video}
        - VITE_GRAPHQL_ENDPOINT=${VITE_GRAPHQL_ENDPOINT:-https://api-load-test.p9sphere.com/api/v1/graphql}
        - VITE_REST_API_URL=${VITE_REST_API_URL:-https://api-load-test.p9sphere.com/}
        - VITE_PROCESS_VIDEO_API_URL=${VITE_PROCESS_VIDEO_API_URL:-https://video-processing.p9sphere.com/api/v1/process_video}
        - VITE_NOTIFICATIONS_STATUS_URL=${VITE_NOTIFICATIONS_STATUS_URL:-https://api-load-test.p9sphere.com/api/v1/notifications/status}
        - VITE_SEMANTIC_SEARCH_API_URL=${VITE_SEMANTIC_SEARCH_API_URL:-https://api-load-test.p9sphere.com/api/v1/search/semantic}
    container_name: spectra-frontend-dev
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=development
    volumes:
      - ./src:/app/src
      - ./public:/app/public
    restart: unless-stopped
    networks:
      - spectra-network

  # Optional: Nginx reverse proxy for production-like setup
  nginx:
    image: nginx:alpine
    container_name: spectra-frontend-nginx
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - spectra-frontend
    networks:
      - spectra-network
    restart: unless-stopped

networks:
  spectra-network:
    driver: bridge
